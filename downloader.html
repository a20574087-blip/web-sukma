<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Downloader - SUKMA JR</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg1:#0a0a1f;
--bg2:#1a0b2e;
--bg3:#2d1b4e;
--card:rgba(35,25,60,.5);
--text:#f5f5f7;
--subtext:#a1a1aa;
--accent:#8b5cf6;
--border:rgba(139,92,246,.2);
--blur:16px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
radial-gradient(1200px 800px at 50% -20%,var(--bg2),var(--bg1)),
linear-gradient(180deg,var(--bg1),var(--bg3));
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:var(--text);
overflow-x:hidden;
position:relative;
}

body::before{
content:'';
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
radial-gradient(2px 2px at 20px 30px,var(--accent),transparent),
radial-gradient(2px 2px at 40px 70px,var(--accent),transparent);
background-size:200px 200px;
opacity:.25;
animation:particles 20s linear infinite;
pointer-events:none;
}

@keyframes particles{
from{
transform:translateY(0);
}
to{
transform:translateY(-200px);
}
}

.back-btn{
position:fixed;
top:10px;
left:10px;
z-index:999;

padding:6px 10px;

background:rgba(35,25,60,.8);
border:1px solid rgba(139,92,246,.2);

border-radius:10px;

color:#fff;
text-decoration:none;
font-weight:600;
font-size:12px;

backdrop-filter:blur(16px);
}

display:flex;
align-items:center;
gap:8px;

padding:12px 18px;

background:rgba(35,25,60,.8);
backdrop-filter:blur(16px);

border:1px solid var(--border);
border-radius:14px;

color:#fff;
text-decoration:none;
font-weight:600;
font-size:14px;

transition:.3s;
}

.back-btn:hover{
background:var(--accent);
transform:translateY(-2px);
}

.container{
width:100%;
max-width:620px;

background:var(--card);
border:1px solid var(--border);

backdrop-filter:blur(var(--blur));

border-radius:24px;

padding:25px;

box-shadow:0 0 30px rgba(139,92,246,.15);

position:relative;
z-index:1;
}

.logo{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
border:2px solid var(--accent);
box-shadow:0 0 25px rgba(139,92,246,.4);
}

.title{
text-align:center;
font-size:26px;
font-weight:700;
margin-top:15px;
margin-bottom:8px;

background:linear-gradient(90deg,#fff,var(--accent));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
font-size:13px;
color:var(--subtext);
margin-bottom:25px;
}

.input-group{
display:flex;
flex-direction:column;
gap:12px;
}

input{
width:100%;

padding:15px;

background:rgba(255,255,255,.05);

border:1px solid var(--border);

border-radius:16px;

outline:none;

color:#fff;

font-size:14px;

word-break:break-all;
}

input::placeholder{
color:#888;
}

.btn{
width:100%;

padding:15px;

border:none;

border-radius:16px;

background:var(--accent);

color:#fff;

font-weight:600;

font-size:15px;

cursor:pointer;

transition:.3s;
}

.btn:hover{
transform:translateY(-2px);
}

.loader{
display:none;
justify-content:center;
align-items:center;
gap:12px;
margin-top:20px;
color:var(--subtext);
font-size:14px;
}

.spinner{
width:25px;
height:25px;

border:3px solid rgba(255,255,255,.15);
border-top:3px solid var(--accent);

border-radius:50%;

animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.result{
display:none;
margin-top:25px;
overflow:hidden;
}

.thumbnail{
width:100%;
max-width:100%;
display:block;
border-radius:18px;
margin-bottom:15px;
}

.video-title{
font-size:14px;
line-height:1.7;
color:var(--subtext);

word-wrap:break-word;
overflow-wrap:break-word;
word-break:break-word;

margin-bottom:15px;
}

.download-btn{
display:block;

width:100%;

padding:15px;

border-radius:16px;

text-decoration:none;

text-align:center;

font-weight:600;

margin-top:10px;

transition:.3s;
}

.video-btn{
background:#22c55e;
color:#fff;
}

.audio-btn{
background:#f59e0b;
color:#fff;
}

.download-btn:hover{
transform:translateY(-2px);
}

@media(max-width:480px){

.container{
padding:18px;
}

.title{
font-size:22px;
}

.back-btn{
top:12px;
left:12px;
padding:10px 14px;
font-size:13px;
}

}
</style>
</head>
<body>

<a href="index.html" class="back-btn">
← Kembali
</a>

<div class="container">

<img
src="https://files.catbox.moe/6m6ii5.jpg"
class="logo"
alt="Logo">

<div class="title">
TikTok Downloader
</div>

<div class="subtitle">
Download Video & Audio TikTok
</div>

<div class="input-group">

<input
type="text"
id="url"
placeholder="Tempel link TikTok di sini...">

<button
class="btn"
onclick="downloadTT()">
⬇️ Download
</button>

</div>

<div
class="loader"
id="loader">

<div class="spinner"></div>

<span>Mengambil data video...</span>

</div>

<div
class="result"
id="result">

<img
id="thumb"
class="thumbnail">

<div
class="video-title"
id="videoTitle">
</div>

<a
id="videoBtn"
target="_blank"
class="download-btn video-btn">
🎥 Download Video
</a>

<a
id="audioBtn"
target="_blank"
class="download-btn audio-btn">
🎵 Download Audio
</a>

</div>

</div>

<script>
async function downloadTT(){

const url =
document.getElementById("url").value.trim();

if(!url){
alert("Masukkan link TikTok terlebih dahulu!");
return;
}

document.getElementById("loader").style.display = "flex";
document.getElementById("result").style.display = "none";

try{

const response =
await fetch(
"https://www.tikwm.com/api/?url=" +
encodeURIComponent(url)
);

const data =
await response.json();

if(!data.data){
throw new Error("Data tidak ditemukan");
}

document.getElementById("thumb").src =
data.data.cover;

document.getElementById("videoTitle").innerText =
data.data.title || "Video TikTok";

document.getElementById("videoBtn").href =
data.data.play;

document.getElementById("audioBtn").href =
data.data.music;

document.getElementById("result").style.display =
"block";

}catch(err){

alert("Gagal mengambil data video!");

console.log(err);

}

document.getElementById("loader").style.display =
"none";

}
</script>

</body>
</html>
