<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensivitas - SUKMA JR</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg1: #0a0a1f;
      --bg2: #1a0b2e;
      --accent: #00ffff;
      --accent-glow: rgba(0, 255, 255, 0.4);
      --card: rgba(20, 20, 40, 0.6);
      --text: #f5f5f7;
      --subtext: #a1a1aa;
      --blur: 16px;
    }

    * {margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif;}

    body {
      background: radial-gradient(1200px 800px at 50% -20%, var(--bg2), var(--bg1)),
                  linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .btn-back {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 1001;
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card);
      border: 1px solid rgba(0,255,255,0.2);
      border-radius: 14px;
      backdrop-filter: blur(12px);
      color: var(--text);
      font-size: 18px;
      text-decoration: none;
      transition: 0.25s;
    }
    .btn-back:hover {
      background: rgba(0,255,255,0.2);
      border-color: var(--accent);
      box-shadow: 0 0 15px var(--accent-glow);
      transform: scale(1.05);
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 90px 20px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 26px;
      color: var(--accent);
      margin-bottom: 8px;
      text-shadow: 0 0 20px var(--accent-glow);
    }
    .header p {
      font-size: 14px;
      color: var(--subtext);
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(0,255,255,0.3);
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 18px;
      backdrop-filter: blur(var(--blur));
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--subtext);
    }
    .form-input {
      width: 100%;
      padding: 14px;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(0,255,255,0.2);
      border-radius: 12px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .btn-sesuaikan {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, var(--accent), #7dd3fc);
      color: #000;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.3s;
    }
    .btn-sesuaikan:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 10px;
    }
    .result-item {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(0,255,255,0.2);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }
    .result-label {
      font-size: 12px;
      color: var(--subtext);
      margin-bottom: 6px;
    }
    .result-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
    }

    .btn-copy {
      width: 100%;
      margin-top: 15px;
      padding: 14px;
      border: 1px solid var(--accent);
      border-radius: 12px;
      background: transparent;
      color: var(--accent);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.3s;
    }
    .btn-copy:hover {
      background: rgba(0,255,255,0.1);
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--card);
      border: 1px solid var(--accent);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      opacity: 0;
      transition: 0.4s;
      z-index: 2000;
      backdrop-filter: blur(var(--blur));
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <a href="index.html" class="btn-back">
    <i class="fa-solid fa-arrow-left"></i>
  </a>

  <div class="container">
    <div class="header">
      <h1><i class="fa-solid fa-dice"></i> Sensivitas</h1>
      <p>Generate sensivitas</p>
    </div>

    <div class="card">
      <div class="form-group">
        <label class="form-label">Merk HP</label>
        <input type="text" id="merkHP" class="form-input" placeholder="Contoh: Redmi Note 13">
      </div>

      <div class="form-group">
        <label class="form-label">DPI Saat Ini</label>
        <input type="number" id="dpiInput" class="form-input" placeholder="Contoh: 400" min="100" max="1200">
      </div>

      <button class="btn-sesuaikan" onclick="randomSens()">
        <i class="fa-solid fa-shuffle"></i> Generate
      </button>
    </div>

    <div class="card" id="resultCard" style="display: none;">
      <div class="result-grid">
        <div class="result-item">
          <div class="result-label">Lihat Sekeliling</div>
          <div class="result-value" id="lihat">0</div>
        </div>
        <div class="result-item">
          <div class="result-label">Red Dot Sight</div>
          <div class="result-value" id="reddot">0</div>
        </div>
        <div class="result-item">
          <div class="result-label">2× Scope</div>
          <div class="result-value" id="scope2">0</div>
        </div>
        <div class="result-item">
          <div class="result-label">4× Scope</div>
          <div class="result-value" id="scope4">0</div>
        </div>
        <div class="result-item">
          <div class="result-label">Sniper Scope</div>
          <div class="result-value" id="sniper">0</div>
        </div>
        <div class="result-item">
          <div class="result-label">Kamera Bebas</div>
          <div class="result-value" id="kamera">0</div>
        </div>
      </div>

      <button class="btn-copy" onclick="copySens()">
        <i class="fa-solid fa-copy"></i> Copy Semua Sensivitas
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const toast = document.getElementById('toast');
    let hasilSens = {};

    // Fungsi random 100-200
    function rand100_200() {
      return Math.floor(Math.random() * 101) + 100;
    }

    function randomSens() {
      const merk = document.getElementById('merkHP').value.trim();
      const dpi = document.getElementById('dpiInput').value;

      if (!merk) return showToast('Isi merk HP dulu');

      // Generate random 100-200 semua
      hasilSens = {
        lihat: rand100_200(),
        reddot: rand100_200(),
        scope2: rand100_200(),
        scope4: rand100_200(),
        sniper: rand100_200(),
        kamera: rand100_200()
      };

      // Tampilkan hasil
      document.getElementById('lihat').textContent = hasilSens.lihat;
      document.getElementById('reddot').textContent = hasilSens.reddot;
      document.getElementById('scope2').textContent = hasilSens.scope2;
      document.getElementById('scope4').textContent = hasilSens.scope4;
      document.getElementById('sniper').textContent = hasilSens.sniper;
      document.getElementById('kamera').textContent = hasilSens.kamera;

      document.getElementById('resultCard').style.display = 'block';
      showToast('Sensivitas yang cocok berhasil di generate');
    }

    function copySens() {
      const text = `SENSIVITAS RANDOM ${document.getElementById('merkHP').value.toUpperCase()}
DPI: ${document.getElementById('dpiInput').value || '-'}

Lihat Sekeliling: ${hasilSens.lihat}
Red Dot Sight: ${hasilSens.reddot}
2x Scope: ${hasilSens.scope2}
4x Scope: ${hasilSens.scope4}
Sniper Scope: ${hasilSens.sniper}
Kamera Bebas: ${hasilSens.kamera}`;

      navigator.clipboard.writeText(text);
      showToast('Sensivitas berhasil di copy');
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
