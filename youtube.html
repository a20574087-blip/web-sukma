<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUKMA JR</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg1:#0a0a1f;
  --bg2:#1a0b2e;
  --bg3:#2d1b4e;
  --card:rgba(35,25,60,0.5);
  --text:#f5f5f7;
  --subtext:#a1a1aa;
  --accent:#8b5cf6;
  --border:rgba(139,92,246,0.2);
  --blur:16px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:radial-gradient(circle at top,var(--bg2),var(--bg1));
color:var(--text);
min-height:100vh;
padding:20px;
}

/* CARD */
.card{
background:var(--card);
border:1px solid var(--border);
backdrop-filter:blur(var(--blur));
border-radius:16px;
padding:16px;
margin-bottom:12px;
}

/* TITLE */
.section-title{
margin:20px 0 10px;
font-weight:700;
color:var(--accent);
}

/* SEARCH */
.search-box{
display:flex;
gap:10px;
margin-bottom:10px;
}

input{
flex:1;
padding:12px;
border-radius:12px;
border:none;
outline:none;
background:#1b1b2f;
color:white;
}

button{
padding:12px 16px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
font-weight:600;
cursor:pointer;
}

/* YOUTUBE CARD */
.yt-card{
display:flex;
gap:10px;
align-items:center;
padding:10px;
border-radius:12px;
background:rgba(255,255,255,0.03);
cursor:pointer;
transition:.2s;
margin-bottom:10px;
}

.yt-card:hover{
background:rgba(139,92,246,0.2);
}

.yt-card img{
width:80px;
height:60px;
border-radius:10px;
object-fit:cover;
}

.yt-title{
font-size:13px;
font-weight:600;
}

.yt-channel{
font-size:11px;
color:var(--subtext);
}

/* PLAYER */
.player{
position:sticky;
bottom:0;
margin-top:20px;
}

iframe{
width:100%;
height:220px;
border:none;
border-radius:12px;
}

.back-btn{
position:sticky;
top:10px;
margin-bottom:10px;
padding:10px 14px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:var(--text);
cursor:pointer;
font-weight:600;
transition:.2s;
}

.back-btn:hover{
background:var(--accent);
}
</style>
</head>

<body>

<h2>🎵 SUKMA JR YOUTUBE</h2>

<button class="back-btn" onclick="goBack()">⬅ Kembali</button>

<!-- MUSIC SEARCH -->
<div class="card">

<div class="section-title">Cari Video YouTube</div>

<div class="search-box">
<input id="ytSearch" placeholder="contoh: Free Fire Word Cup">
<button onclick="searchYT()">Cari</button>
</div>

<div id="ytResults"></div>

</div>

<!-- PLAYER -->
<div class="player">
<div id="nowPlaying" style="margin-bottom:8px;color:var(--accent)">
Belum ada lagu diputar
</div>

<div id="ytPlayer"></div>
</div>

<script>
  
  function goBack(){
window.location.href = "index.html";
}

const YT_API_KEY = "AIzaSyDV_9WUZ8B33F3ryAu6DOuWvQU85nqRDME";

async function searchYT(){

const q = document.getElementById("ytSearch").value;

if(!q) return;

document.getElementById("ytResults").innerHTML =
"<p>Loading...</p>";

const res = await fetch(
`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=10&q=${encodeURIComponent(q)}&key=${YT_API_KEY}`
);

const data = await res.json();

let html = "";

data.items.forEach(v=>{

html += `
<div class="yt-card" onclick="playYT('${v.id.videoId}','${v.snippet.title.replace(/'/g,"")}')">

<img src="${v.snippet.thumbnails.medium.url}">

<div>
<div class="yt-title">${v.snippet.title}</div>
<div class="yt-channel">${v.snippet.channelTitle}</div>
</div>

</div>
`;

});

document.getElementById("ytResults").innerHTML = html;

}

function playYT(id,title){

document.getElementById("nowPlaying").innerText =
"▶ " + title;

document.getElementById("ytPlayer").innerHTML = `
<iframe src="https://www.youtube.com/embed/${id}?autoplay=1"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
`;

}

</script>

</body>
</html>
