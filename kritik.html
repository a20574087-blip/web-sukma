<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kritik & Saran - SUKMA JR</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg1:#0a0a1f;
--bg2:#1a0b2e;
--bg3:#2d1b4e;
--card:rgba(35,25,60,.5);
--text:#f5f5f7;
--subtext:#a1a1aa;
--accent:#8b5cf6;
--border:rgba(139,92,246,.2);
--blur:16px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
radial-gradient(1200px 800px at 50% -20%,var(--bg2),var(--bg1)),
linear-gradient(180deg,var(--bg1),var(--bg3));
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
color:var(--text);
position:relative;
}

body::before{
content:'';
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
radial-gradient(2px 2px at 20px 30px,var(--accent),transparent),
radial-gradient(2px 2px at 40px 70px,var(--accent),transparent);
background-size:200px 200px;
opacity:.25;
animation:particles 20s linear infinite;
pointer-events:none;
}

@keyframes particles{
from{transform:translateY(0);}
to{transform:translateY(-200px);}
}

.back-btn{
position:fixed;
top:12px;
left:12px;
z-index:999;

padding:8px 14px;

background:rgba(35,25,60,.8);
border:1px solid var(--border);

border-radius:12px;

color:#fff;
text-decoration:none;
font-size:13px;
font-weight:600;

backdrop-filter:blur(var(--blur));
transition:.3s;
}

.back-btn:hover{
background:var(--accent);
}

.container{
width:100%;
max-width:600px;

background:var(--card);
border:1px solid var(--border);

backdrop-filter:blur(var(--blur));

padding:28px;
border-radius:24px;

position:relative;
z-index:1;
}

.logo{
width:90px;
height:90px;

border-radius:50%;
object-fit:cover;

display:block;
margin:auto;

border:2px solid var(--accent);
box-shadow:0 0 25px rgba(139,92,246,.4);
}

.title{
text-align:center;
font-size:28px;
font-weight:700;
margin-top:15px;

background:linear-gradient(90deg,#fff,var(--accent));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
font-size:14px;
color:var(--subtext);
margin-top:8px;
margin-bottom:25px;
line-height:1.7;
}

input,
textarea{
width:100%;

padding:14px;

background:rgba(255,255,255,.05);

border:1px solid var(--border);
border-radius:16px;

outline:none;

color:white;
font-size:14px;

margin-bottom:14px;
}

textarea{
height:130px;
resize:none;
}

label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:600;
}

.submit-btn{
width:100%;

padding:15px;

border:none;
border-radius:16px;

background:var(--accent);

color:white;

font-size:15px;
font-weight:600;

cursor:pointer;

transition:.3s;
}

.submit-btn:hover{
transform:translateY(-2px);
}

.loading{
display:none;
text-align:center;
margin-top:15px;
color:var(--subtext);
font-size:14px;
}

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:var(--subtext);
opacity:.7;
}

@media(max-width:480px){

.container{
padding:20px;
}

.title{
font-size:24px;
}

.back-btn{
font-size:12px;
padding:7px 12px;
}

}
</style>
</head>
<body>

<a href="index.html" class="back-btn">
← Kembali
</a>

<div class="container">

<img
src="https://files.catbox.moe/6m6ii5.jpg"
alt="SUKMA JR"
class="logo">

<div class="title">
Kritik & Saran
</div>

<div class="subtitle">
Masukan dari kamu sangat membantu untuk meningkatkan kualitas website SUKMA JR 💜
</div>

<form id="kritikForm">

<input
type="text"
name="nama"
placeholder="Nama (Opsional)">

<label>📌 Kritik</label>

<textarea
name="kritik"
placeholder="Tulis kritik kamu disini..."
required>
</textarea>

<label>💡 Saran</label>

<textarea
name="saran"
placeholder="Tulis saran kamu disini..."
required>
</textarea>

<button
type="submit"
class="submit-btn">
📨 Kirim Kritik & Saran
</button>

</form>

<div class="loading" id="loading">
Mengirim pesan...
</div>

<div class="footer">
© 2026 SUKMA JR
</div>

</div>

<script>
const form = document.getElementById("kritikForm");
const loading = document.getElementById("loading");

form.addEventListener("submit", async (e) => {

e.preventDefault();

loading.style.display = "block";

const data = new FormData(form);

try{

const response = await fetch(
"https://formspree.io/f/xgoqldzq",
{
method:"POST",
body:data,
headers:{
"Accept":"application/json"
}
}
);

if(response.ok){

alert("Terima kasih ❤️ Kritik dan saran berhasil dikirim.");

form.reset();

}else{

alert("Gagal mengirim pesan.");

}

}catch(err){

alert("Terjadi kesalahan koneksi.");

}

loading.style.display = "none";

});
</script>

</body>
</html>
