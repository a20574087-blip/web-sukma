<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>List Akun Rental - SukmaJr Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1: #0a0a1f; --bg2: #1a0b2e; --bg3: #2d1b4e;
    --card: rgba(35, 25, 60, 0.6); --text: #f5f5f7;
    --subtext: #a1a1aa; --accent: #8b5cf6;
    --accent-glow: rgba(139, 92, 246, 0.5); --border: rgba(139, 92, 246, 0.2);
  }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

  body {
    background: radial-gradient(1200px 800px at 50% -20%, var(--bg2), var(--bg1)),
                linear-gradient(180deg, var(--bg1), var(--bg3));
    color: var(--text); padding: 20px; min-height: 100vh;
  }

  h1 {
    text-align: center; margin-bottom: 20px; font-weight: 700;
    background: linear-gradient(90deg, var(--text), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .back-btn {
    display: inline-block; margin-bottom: 20px; padding: 10px 18px;
    background: var(--card); border: 1px solid var(--border); backdrop-filter: blur(12px);
    color: var(--text); border-radius: 12px; text-decoration: none; font-weight: 600;
  }

  .akun {
    background: var(--card); border: 1px solid var(--border); backdrop-filter: blur(16px);
    border-radius: 16px; box-shadow: 0 8px 30px rgba(139,92,246,0.15);
    margin-bottom: 30px; padding: 18px; max-width: 600px; margin-left: auto; margin-right: auto;
  }

  .akun h2 { margin: 0 0 10px 0; color: var(--accent); }
  .akun p { margin: 5px 0; color: var(--subtext); }
  .akun .harga { color: var(--text); font-weight: 600; font-size: 16px; }

  .carousel { position: relative; overflow: hidden; border-radius: 12px; margin-top: 12px; }
  .carousel-track { display: flex; transition: transform 0.4s ease-in-out; }
  .carousel-item { min-width: 100%; box-sizing: border-box; }
  .carousel-item img { width: 100%; display: block; border-radius: 12px; }

  .carousel-controls { text-align: center; margin-top: 12px; }
  .carousel-controls button {
    padding: 8px 16px; margin: 0 5px; border: 1px solid var(--border);
    background: rgba(139,92,246,0.2); color: var(--text); border-radius: 8px;
    cursor: pointer; font-weight: 600;
  }

  .buy-btn {
    margin-top: 14px; width: 100%; padding: 12px; border: none;
    background: linear-gradient(135deg, var(--accent), #a78bfa); color: #fff;
    border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 700;
  }
</style>
</head>
<body>

<a href="layanan.html" class="back-btn">← Kembali</a>
<h1>List Akun Rental</h1>

<div id="list-akun"></div>

<script src="data-rental.js"></script>
<script>
  const container = document.getElementById('list-akun');
  
  dataRental.forEach((akun, i) => {
    let gambarHTML = akun.gambar.map(img => `
      <div class="carousel-item">
        <img src="${img}" alt="${akun.nama} Gambar">
      </div>
    `).join('');
    
    container.innerHTML += `
      <div class="akun">
        <h2>${akun.nama}</h2>
        <p class="harga">Harga: ${akun.harga}</p>
        <p class="login">Login: ${akun.login}</p>
        <p>${akun.deskripsi}</p>
        <div class="carousel">
          <div class="carousel-track">${gambarHTML}</div>
          <div class="carousel-controls">
            <button class="prev">Prev</button>
            <button class="next">Next</button>
          </div>
        </div>
        <button class="buy-btn" onclick="window.open('https://wa.me/6282266888892?text=Halo%20min%20mau%20rental%20${encodeURIComponent(akun.nama)}', '_blank')">
          Sewa Sekarang
        </button>
      </div>
    `;
  });

  // Carousel logic
  document.querySelectorAll('.akun').forEach(akun => {
    const track = akun.querySelector('.carousel-track');
    const items = Array.from(track.children);
    const prevBtn = akun.querySelector('.prev');
    const nextBtn = akun.querySelector('.next');
    let index = 0;

    function updateCarousel() {
      track.style.transform = 'translateX(-' + index * 100 + '%)';
    }

    prevBtn.addEventListener('click', () => {
      index = (index === 0) ? items.length - 1 : index - 1;
      updateCarousel();
    });

    nextBtn.addEventListener('click', () => {
      index = (index === items.length - 1) ? 0 : index + 1;
      updateCarousel();
    });
  });
</script>

</body>
</html>
